<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens dinâmicas</title>
</head>

<body>
    <h1>Imagens dinâmicas</h1>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/pequeno.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/media.png" type="image/png">
        <img src="imagens/grande.png" alt="imagem flexível">
    </picture>

    <h1>Reproduzir aúdio</h1>
    <!--Formatos suportados: MP3 WAV OGG-->
    <!--<audio src="media/happy-mistake.mp3 " controls autoplay></audio>-->
    <audio preload="metadata " autoplay controls loop>
        <source src="media/guanacast-33.mp3 " type="audio/mpeg ">
        <source src="media/guanacast-33.mp3 " type="audio/ogg ">
        <source src="media/guanacast-33.mp3 " type="audio/wav ">
        <p>Infelizmente seu computador não consegue reproduzir audio. <a href="media/guanacast-33.mp3 ">Clique aqui para baixar o arquivo MP3.</a></p>
    </audio>
</body>

</html>
