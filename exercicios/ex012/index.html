<!DOCTYPE html>
<html lang="pt-br">

<head>

    <title>Vídeos</title>
</head>

<body>
    <h1>Colocando vídeos no site</h1>
    <p>Esse vídeo está hospedado no meu servidor</p>

    <!--<video src="media/meu-video.mp4" width="500" controls></video>-->


    <!--Fazer dessa forma gera custos muito altos-->
    <video width="500" poster="imagens/limoes-capa.png" controls autoplay loop>
    <source src="media/meu-video.mp4" type="video/mp4">
    <source src="media/meu-video.m4v" type="video/mp4">
    <source src="media/meu-video.webm" type="video/webm">
    <source src="media/meu-video.ogv" type="video/ogv">
    <p>Seu navegador não tem compatibilidade com reprodução de vídeo.</p>
    </video>


    <h1>Inserindo vídeos com youtube</h1>
    <iframe width="500" height="315" src="https://www.youtube.com/embed/jNQXAC9IVRw?si=mk37mtE3gAELWJ2y" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Inserindo vídeos do vimeo</h1>
    <iframe src="https://player.vimeo.com/video/406071329?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="500" height="375" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin"
